name: CI - Main

on:
  workflow_dispatch: # manual trigger via GitHub Actions UI

  # push:
  #   branches:
  #     - main

jobs:
  # ─── STAGE 1 (parallel) ───────────────────────────────────────────────────

  lint-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:ci

  # ─── STAGE 2 (parallel) ───────────────────────────────────────────────────

  sca:
    name: SCA - Dependency Vulnerabilities
    runs-on: ubuntu-latest
    needs: [lint-format, secret-scan, build-check, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        # audit-level=high: fail only on high/critical findings
        run: npm audit --audit-level=high --omit=dev

  sast:
    name: SAST - Static Security Analysis
    runs-on: ubuntu-latest
    needs: [lint-format, secret-scan, build-check, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/typescript
            p/nodejs
            p/secrets
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  # ─── STAGE 3 ──────────────────────────────────────────────────────────────

  build-and-stage:
    name: Build & Stage Image (ghcr.io)
    runs-on: ubuntu-latest
    needs: [sca, sast]
    permissions:
      contents: read
      packages: write
    outputs:
      staged-image: ${{ steps.image-ref.outputs.ref }}
      image-digest: ${{ steps.push.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=staging

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push to ghcr.io (staging)
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract single image ref for scanning
        id: image-ref
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "ref=ghcr.io/${{ github.repository }}:sha-${SHORT_SHA}" >> $GITHUB_OUTPUT

  # ─── STAGE 4 ──────────────────────────────────────────────────────────────

  scan-image:
    name: Scan Image for CVEs
    runs-on: ubuntu-latest
    needs: [build-and-stage]
    permissions:
      contents: read
      packages: read
    steps:
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: ${{ needs.build-and-stage.outputs.staged-image }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1
          trivyignores: .trivyignore

  # ─── STAGE 5 ──────────────────────────────────────────────────────────────

  push-and-sign:
    name: Push & Sign Image (Docker Hub)
    runs-on: ubuntu-latest
    needs: [scan-image, build-and-stage]
    permissions:
      id-token: write
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker Hub metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/currency-service
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Push scanned image to Docker Hub
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        run: |
          cosign sign --yes \
            ${{ secrets.DOCKERHUB_USERNAME }}/currency-service@${{ steps.push.outputs.digest }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ secrets.DOCKERHUB_USERNAME }}/currency-service@${{ steps.push.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attach SBOM to image
        run: |
          cosign attach sbom \
            --sbom sbom.spdx.json \
            ${{ secrets.DOCKERHUB_USERNAME }}/currency-service@${{ steps.push.outputs.digest }}

  # ─── STAGE 6 ──────────────────────────────────────────────────────────────

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [push-and-sign]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build server
        run: npm run build

      # The smoke test spins up the real server binary (no mocks).
      # Downstream gRPC services are not called by GetSupportedCurrencies
      # or the health check, so no stubs are needed.
      - name: Start server
        run: |
          PORT=7000 node dist/server.js &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
          sleep 2

      - name: Install grpcurl
        run: |
          curl -sSL https://github.com/fullstorydev/grpcurl/releases/download/v1.9.1/grpcurl_1.9.1_linux_x86_64.tar.gz \
            | tar -xz -C /usr/local/bin grpcurl

      - name: Smoke test - health check
        run: |
          response=$(grpcurl -plaintext localhost:7000 grpc.health.v1.Health/Check)
          status=$(echo "$response" | grep -o '"status": "[^"]*"' | cut -d'"' -f4)
          if [ "$status" != "SERVING" ]; then
            echo "FAIL: expected SERVING, got '$status'"
            exit 1
          fi
          echo "PASS: service is SERVING"

      - name: Smoke test - GetSupportedCurrencies returns data
        run: |
          response=$(grpcurl -plaintext localhost:7000 hipstershop.CurrencyService/GetSupportedCurrencies)
          if ! echo "$response" | grep -q '"EUR"'; then
            echo "FAIL: EUR not found in supported currencies"
            echo "$response"
            exit 1
          fi
          count=$(echo "$response" | grep -o '"[A-Z][A-Z][A-Z]"' | wc -l)
          echo "PASS: GetSupportedCurrencies returned $count currency codes"

      - name: Stop server
        if: always()
        run: kill $SERVER_PID 2>/dev/null || true